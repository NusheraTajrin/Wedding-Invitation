<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Invitation Envelope</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #f7f1ea, #f3e7df);
  font-family: 'Playfair Display', serif;
  overflow: hidden;
}

/* Scene */
.scene {
  perspective: 1200px;
}

/* Envelope Container */
.envelope-wrapper {
  position: relative;
  width: 360px;
  height: 240px;
  cursor: pointer;
}

/* Base envelope */
.envelope {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fffaf3;
  border-radius: 8px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  overflow: hidden;
}

/* Bottom flap */
.envelope::before {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100%;
  background: #f2e6d9;
  clip-path: polygon(0 100%, 50% 55%, 100% 100%);
}

/* Top flap */
.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: #f7efe6;
  clip-path: polygon(0 0, 50% 55%, 100% 0);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 3;
}

/* Wax seal */
.seal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 55px;
  background: radial-gradient(circle at 30% 30%, #d94b4b, #8b1e1e);
  border-radius: 50%;
  box-shadow: 0 8px 15px rgba(0,0,0,0.25);
  z-index: 5;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-size: 12px;
  letter-spacing: 1px;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* Invitation page */
.invitation {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(30px);
  transition: all 1s ease;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  padding: 20px;
  text-align: center;
}

.invitation h1 {
  margin: 0;
  font-size: 28px;
  color: #b07a5a;
}

.invitation p {
  margin-top: 10px;
  color: #555;
  font-size: 16px;
}

/* OPEN STATE */
.open .flap {
  transform: rotateX(180deg);
}

.open .seal {
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
}

.open + .invitation {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<div class="scene">
  <div class="envelope-wrapper" id="envelope">
    
    <div class="envelope"></div>
    <div class="flap"></div>

    <div class="seal">OPEN</div>

    <div class="invitation">
      <h1>Wedding Invitation</h1>
      <p>
        Tauhidul & Nushera<br/>
        22nd June • 12:00 PM<br/>
        Brahmanbaria, Bangladesh
      </p>
    </div>

  </div>
</div>

<script>
const envelope = document.getElementById("envelope");
const seal = document.querySelector(".seal");

seal.addEventListener("click", () => {
  envelope.classList.add("open");
});
</script>

</body>
</html>
