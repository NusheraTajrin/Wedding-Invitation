<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation — Tauhidul & Nushera</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f1ea;
  --ivory:#fbf7f0;
  --gold:#b89a6a;
  --green:#1f3a2e;
  --muted:#6e7f72;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  color:var(--green);
  overflow-x:hidden;
}

/* ================= ENVELOPE ================= */
#envelope-screen{
  position:fixed;
  inset:0;
  background:#0f1f18;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}

.env-hint{
  position:absolute;
  top:6%;
  color:#fff;
  letter-spacing:.35em;
  font-size:12px;
  opacity:.7;
}

.envelope{
  width:min(75vw,520px);
  aspect-ratio:4/3;
  position:relative;
  cursor:pointer;
}

.env-base{
  position:absolute;
  inset:0;
  background:linear-gradient(145deg,#2a3f35,#17261f);
  border:1px solid rgba(255,255,255,.1);
}

.env-flap{
  position:absolute;
  width:100%;
  height:60%;
  top:0;
  background:linear-gradient(145deg,#314a3e,#1a2b23);
  transform-origin:top;
  transition:1.4s ease;
}

.env-flap.open{
  transform:rotateX(160deg);
  opacity:0;
}

.seal{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80px;
  height:80px;
  background:radial-gradient(circle,#c9a86a,#8c6d3b);
  border-radius:50%;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.seal:active{
  transform:translate(-50%,-50%) scale(.92);
}

.seal-text{
  position:absolute;
  bottom:8%;
  color:#fff;
  font-size:11px;
  letter-spacing:.3em;
}

/* ================= INVITATION ================= */
#invitation{
  opacity:0;
  transform:translateY(30px);
  transition:1.5s ease;
}

#invitation.show{
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--ivory);
  padding:60px 20px;
  position:relative;
}

.card{
  background:white;
  padding:60px 40px;
  text-align:center;
  max-width:520px;
  border:1px solid rgba(184,154,106,.3);
  box-shadow:0 20px 60px rgba(0,0,0,.08);
  position:relative;
}

.names{
  font-family:'Great Vibes',cursive;
  font-size:54px;
  color:var(--green);
}

.amp{
  font-family:'Cormorant Garamond';
  font-size:28px;
  color:var(--gold);
}

/* FLORAL FRAME SVG */
.floral{
  position:absolute;
  inset:-20px;
  opacity:.2;
  pointer-events:none;
}

/* DETAILS */
.section{
  padding:80px 20px;
  text-align:center;
  background:linear-gradient(180deg,#fff,#f3eee6);
}

.title{
  letter-spacing:.3em;
  font-size:12px;
  color:var(--muted);
  margin-bottom:20px;
}

.big{
  font-size:34px;
  font-family:'Cormorant Garamond';
}

/* MAP */
.map{
  margin-top:40px;
  border-radius:10px;
  overflow:hidden;
  max-width:600px;
  margin-inline:auto;
}

/* COUNTDOWN */
.count{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.box{
  text-align:center;
}

/* FOOTER */
footer{
  padding:60px 20px;
  text-align:center;
  background:#efe7db;
  font-family:'Cormorant Garamond';
}
</style>
</head>

<body>

<!-- MUSIC (OPTION B) -->
<audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- ================= ENVELOPE ================= -->
<div id="envelope-screen">
  <div class="env-hint">Tap to open</div>

  <div class="envelope" onclick="openInvite()">
    <div class="env-base"></div>
    <div class="env-flap" id="flap"></div>
    <div class="seal"></div>
  </div>

  <div class="seal-text">OUR INVITATION</div>
</div>

<!-- ================= INVITATION ================= -->
<div id="invitation">

  <section class="hero">

    <!-- SVG FLORAL FRAME -->
    <svg class="floral" viewBox="0 0 500 500">
      <path d="M50,450 C150,300 350,300 450,50" stroke="#2f4f3f" fill="none"/>
      <path d="M80,420 C180,280 320,280 420,80" stroke="#2f4f3f" fill="none"/>
      <circle cx="100" cy="400" r="6" fill="#b89a6a"/>
      <circle cx="400" cy="100" r="6" fill="#b89a6a"/>
    </svg>

    <div class="card">
      <div class="title">Together With Families</div>

      <div class="names">
        Tauhidul Islam
        <div class="amp">&</div>
        Nushera Tajrin
      </div>

      <p style="margin-top:20px;color:#555">
        request the honor of your presence<br>
        at their wedding ceremony
      </p>
    </div>
  </section>

  <!-- DETAILS -->
  <section class="section">
    <div class="title">Wedding Ceremony</div>
    <div class="big">22nd June, 2026</div>
    <div style="margin-top:10px;">12:00 PM</div>

    <div class="map">
      <!-- GOOGLE MAP (replace later) -->
      <iframe
        width="100%"
        height="300"
        style="border:0"
        loading="lazy"
        allowfullscreen
        src="https://www.google.com/maps?q=Brahmanbaria,Bangladesh&output=embed">
      </iframe>
    </div>

    <div class="count">
      <div class="box"><div id="d">0</div><small>Days</small></div>
      <div class="box"><div id="h">0</div><small>Hours</small></div>
      <div class="box"><div id="m">0</div><small>Min</small></div>
      <div class="box"><div id="s">0</div><small>Sec</small></div>
    </div>
  </section>

  <footer>
    With love ❤️<br>
    Tauhidul & Nushera
  </footer>

</div>

<script>
function openInvite(){
  document.getElementById("flap").classList.add("open");

  setTimeout(()=>{
    document.getElementById("envelope-screen").style.display="none";
    document.getElementById("invitation").classList.add("show");
  },1200);
}

/* COUNTDOWN */
const target = new Date("June 22, 2026 12:00:00").getTime();

setInterval(()=>{
  const now = Date.now();
  const diff = target - now;

  document.getElementById("d").innerText = Math.floor(diff/86400000);
  document.getElementById("h").innerText = Math.floor(diff%86400000/3600000);
  document.getElementById("m").innerText = Math.floor(diff%3600000/60000);
  document.getElementById("s").innerText = Math.floor(diff%60000/1000);
},1000);

/* MUSIC AUTOPLAY FIX */
window.addEventListener("click",()=>{
  document.getElementById("music").play();
},{once:true});
</script>

</body>
</html>
