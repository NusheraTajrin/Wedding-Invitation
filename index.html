*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Jost', sans-serif;
  background: linear-gradient(160deg, #fdf8f0 0%, #f9f2fa 45%, #fdf4f8 100%);
  min-height: 100vh;
  overflow-x: hidden;
  color: #3d2e3a;
}

/* ===== PETALS ===== */
.petal {
  position: fixed;
  top: -40px;
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
  8%   { opacity: 0.4; }
  90%  { opacity: 0.25; }
  100% { transform: translateY(105vh) rotate(500deg) translateX(25px); opacity: 0; }
}

/* ===== SPARKLES ===== */
.spark {
  position: fixed;
  width: 3px; height: 3px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  background: rgba(200, 165, 100, 0.65);
  animation: sparkPulse ease-in-out infinite;
}
@keyframes sparkPulse {
  0%, 100% { transform: scale(0.4); opacity: 0.12; }
  50%       { transform: scale(1.4); opacity: 0.55; }
}
