<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f8f4ff, #ffeef5);
    text-align:center;
    color:#5a4a5f;
    overflow-x:hidden;
}

/* 🌸 FLOATING FLOWERS */
.flower {
    position:fixed;
    top:-50px;
    font-size:20px;
    animation: fall linear infinite;
    opacity:0.8;
    z-index:0;
}

@keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity:0; }
    10% { opacity:1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity:0; }
}

/* ✨ SPARKLES */
.sparkle {
    position:fixed;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px #fff, 0 0 20px #ffb6e6;
    animation: twinkle 2s infinite ease-in-out;
    z-index:0;
}

@keyframes twinkle {
    0%,100% { transform: scale(0.5); opacity:0.3; }
    50% { transform: scale(1.2); opacity:1; }
}

/* Envelope */
.envelope {
    width:280px;
    height:180px;
    background: linear-gradient(135deg, #f3e8ff, #ffd6e8);
    margin:100px auto;
    position:relative;
    cursor:pointer;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    z-index:2;
}

.envelope:before {
    content:'';
    position:absolute;
    top:-90px;
    left:0;
    width:0;
    height:0;
    border-left:140px solid transparent;
    border-right:140px solid transparent;
    border-bottom:90px solid #e6ccff;
    transition:0.8s ease;
    transform-origin:top;
}

.envelope:after {
    content:'Tap to Open 💌';
    position:absolute;
    width:100%;
    top:65px;
    left:0;
    font-size:16px;
    color:#7a5c8a;
}

.open:before {
    transform:rotateX(180deg);
}

/* Card */
.card {
    display:none;
    margin:20px auto;
    padding:25px;
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.75);
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    z-index:2;
    position:relative;
}

h1 {
    font-family:'Great Vibes', cursive;
    font-size:38px;
    color:#b57edc;
}

.names {
    font-size:24px;
    margin:15px 0;
    color:#6a4c6d;
}

.details {
    font-size:16px;
    line-height:1.6;
}

#countdown {
    margin-top:20px;
    font-size:18px;
    color:#b57edc;
}

.fade-in {
    animation:fadeIn 1.8s ease forwards;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* Mobile */
@media (max-width:600px) {
    .envelope {
        width:240px;
        height:160px;
        margin-top:80px;
    }

    .names {
        font-size:20px;
    }

    .details {
        font-size:15px;
    }
}
</style>
</head>

<body>

<!-- 🌸 Flowers will be generated here -->
<div id="flowers"></div>

<!-- ✨ Sparkles -->
<div id="sparkles"></div>

<div class="envelope" onclick="openInvite()"></div>

<div id="card" class="card">
    <h1>You're Invited</h1>

    <div class="names">
        Nushera Tajrin <br> & <br> Tauhidul Islam Bhuiyan
    </div>

    <div class="details">
        <p>With love and joy,</p>
        <p>We invite you to celebrate our wedding</p>
        <p><strong>May 2026 | Noon</strong></p>
        <p>Brahmanbaria</p>
    </div>

    <div id="countdown"></div>
</div>

<script>
function openInvite() {
    document.querySelector('.envelope').classList.add('open');
    let card = document.getElementById('card');
    card.style.display = 'block';
    card.classList.add('fade-in');
}

/* ⏳ Countdown */
var weddingDate = new Date("May 1, 2026 12:00:00").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var distance = weddingDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

    document.getElementById("countdown").innerHTML =
    "⏳ " + days + " Days " + hours + " Hours " + minutes + " Minutes";

    if (distance < 0) {
        document.getElementById("countdown").innerHTML = "💍 It's Wedding Time!";
    }
}, 1000);

/* 🌸 Floating flowers generator */
const flowerSymbols = ["🌸","🌷","💮","🌺"];
for(let i=0;i<25;i++){
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = flowerSymbols[Math.floor(Math.random()*flowerSymbols.length)];
    f.style.left = Math.random()*100 + "vw";
    f.style.animationDuration = (5 + Math.random()*10) + "s";
    f.style.fontSize = (16 + Math.random()*20) + "px";
    document.body.appendChild(f);
}

/* ✨ Sparkles generator */
for(let i=0;i<30;i++){
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    s.style.animationDuration = (1 + Math.random()*2) + "s";
    document.body.appendChild(s);
}
</script>

</body>
</html>
