<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elegant Wedding Invitation Envelope</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #f5f1ea, #e7ded3);
  font-family: 'Playfair Display', serif;
  overflow: hidden;
}

/* Responsive scaling */
.scene {
  perspective: 1400px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.envelope-wrapper {
  position: relative;
  width: min(340px, 90vw);
  height: calc(min(340px, 90vw) * 0.65);
  cursor: pointer;
}

/* ===== ENVELOPE BASE ===== */
.envelope {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #0b3d2e, #0f5a43);
  border-radius: 10px;
  box-shadow:
    0 25px 50px rgba(0,0,0,0.25),
    inset 0 0 30px rgba(255,255,255,0.05);
  overflow: hidden;
  z-index: 1;
}

/* inner paper hint */
.envelope::after {
  content: "";
  position: absolute;
  top: 18%;
  left: 8%;
  width: 84%;
  height: 70%;
  background: rgba(255,255,255,0.85);
  border-radius: 6px;
  transform: translateY(10px);
  transition: all 1s ease;
  z-index: 0;
}

/* Bottom fold */
.envelope::before {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #083225, #0b3d2e);
  clip-path: polygon(0 100%, 50% 55%, 100% 100%);
  z-index: 2;
}

/* ===== TOP FLAP ===== */
.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #0f5a43, #0b3d2e);
  clip-path: polygon(0 0, 50% 60%, 100% 0);
  transform-origin: top;
  transition: transform 1s cubic-bezier(.4,2,.3,1);
  z-index: 4;
  box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2);
}

/* ===== WAX SEAL ===== */
.seal {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  background: radial-gradient(circle at 30% 30%, #d4af37, #8a6a1f);
  border-radius: 50%;
  box-shadow:
    0 10px 18px rgba(0,0,0,0.35),
    inset 0 3px 6px rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
  font-weight: 600;
  letter-spacing: 1px;
  z-index: 5;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

/* ===== INVITATION ===== */
.invitation {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fffdf9;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  opacity: 0;
  transform: translateY(25px) scale(0.98);
  transition: all 1s ease;
  box-shadow: 0 30px 70px rgba(0,0,0,0.25);
  z-index: 3;
}

.invitation h1 {
  margin: 0;
  font-size: 26px;
  color: #0f5a43;
}

.invitation p {
  margin-top: 10px;
  font-size: 15px;
  color: #555;
  line-height: 1.5;
}

/* ===== OPEN STATE ===== */
.open .flap {
  transform: rotateX(180deg);
}

.open .seal {
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
}

.open .invitation {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.open .envelope::after {
  transform: translateY(-40px);
  opacity: 0.4;
}

/* slight lift effect */
.open {
  transform: translateY(-8px);
  transition: transform 0.6s ease;
}
</style>
</head>

<body>

<div class="scene">
  <div class="envelope-wrapper" id="envelope">

    <div class="envelope"></div>
    <div class="flap"></div>

    <div class="seal">T & N</div>

    <div class="invitation">
      <h1>Wedding Invitation</h1>
      <p>
        Tauhidul & Nushera<br/>
        22nd June • 12:00 PM<br/>
        Brahmanbaria, Bangladesh
      </p>
    </div>

  </div>
</div>

<script>
const envelope = document.getElementById("envelope");
const seal = document.querySelector(".seal");

seal.addEventListener("click", () => {
  envelope.classList.add("open");
});
</script>

</body>
</html>
