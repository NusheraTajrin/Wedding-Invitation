<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #3b0a45, #7b3f61);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* Envelope */
.envelope {
    width:300px;
    height:200px;
    background:#800020;
    margin:120px auto;
    position:relative;
    cursor:pointer;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.envelope:before {
    content:'';
    position:absolute;
    top:-100px;
    left:0;
    width:0;
    height:0;
    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-bottom:100px solid #a52a2a;
    transition:0.8s;
}

.open:before {
    transform:rotateX(180deg);
}

/* Invitation Card */
.card {
    display:none;
    margin-top:40px;
    padding:30px;
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    width:80%;
    margin-left:auto;
    margin-right:auto;
    backdrop-filter:blur(10px);
}

/* Text styles */
h1 {
    font-family:'Great Vibes', cursive;
    font-size:50px;
    color:gold;
}

.names {
    font-size:28px;
    color:#e6c9ff;
}

.details {
    margin-top:15px;
    font-size:18px;
}

/* Countdown */
#countdown {
    margin-top:20px;
    font-size:22px;
    color:gold;
}

/* Animation */
.fade-in {
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="envelope" onclick="openInvite()"></div>

<div id="card" class="card">
    <h1>You're Invited</h1>
    
    <div class="names">
        Nushera Tajrin <br> & <br> Tauhidul Islam Bhuiyan
    </div>

    <div class="details">
        <p>With love and blessings,</p>
        <p>You are invited to celebrate our wedding</p>
        <p><strong>May 2026 | Noon</strong></p>
        <p>Brahmanbaria</p>
    </div>

    <div id="countdown"></div>
</div>

<script>
function openInvite() {
    document.querySelector('.envelope').classList.add('open');
    let card = document.getElementById('card');
    card.style.display = 'block';
    card.classList.add('fade-in');
}

/* Countdown */
var weddingDate = new Date("May 1, 2026 12:00:00").getTime();

var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = weddingDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

    document.getElementById("countdown").innerHTML =
    "⏳ " + days + " Days " + hours + " Hours " + minutes + " Minutes";

    if (distance < 0) {
        clearInterval(x);
        document.getElementById("countdown").innerHTML = "🎉 It's Wedding Time!";
    }
}, 1000);
</script>

</body>
</html>
